<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>超级 TikTok Shop 菲律宾利润计算器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>超级 TikTok Shop 菲律宾利润计算器</h1>
    <p>本土店定价、平台结算、风险预留与真实订单复盘</p>
    <div class="tabs"><button id="localTab" class="active">预估定价模式</button><button id="crossTab">真实订单复盘模式</button></div>
    <section class="toolbar">
      <button id="calcBtn">保存当前方案</button>
      <button id="clearBtn">重置按钮</button>
      <button id="defaultsBtn">恢复默认费率</button>
      <button id="copyBtn">复制计算结果</button>
      <button id="exportBtn">导出计算结果为文本</button>
    </section>
  </header>

  <main>
    <section id="localMode" class="mode active">
      <section class="card"><h2>【订单收入】</h2><div id="localBuyer" class="grid"></div><div class="result-grid"><div>买家前台商品小计 <b id="localBuyerSubtotal">0.00</b></div><div>买家最终支付金额 <b id="localBuyerPay">0.00</b></div></div></section>
      <section class="card"><h2>【平台费用端】收入与平台费用</h2><div id="localFees" class="fees"></div><div class="result-grid"><div>商家优惠后商品金额 <b id="localSettlementBase">0.00</b></div><div>平台费用总额 <b id="localPlatformFees">0.00</b></div><div>预计平台结算金额 <b id="localSettlement">0.00</b></div></div></section>
      <section class="card"><h2>【卖家结算端】广告费用、售后与订单风险预留</h2><div id="localSeller"></div></section>
      <section class="card"><h2>真实订单复盘</h2><div id="localReplay"></div></section>
      <section class="card"><h2>本土履约成本</h2><div id="localCosts" class="grid"></div></section>
      <section class="card"><h2>利润结果 / 保本价 / 建议售价</h2><div id="localTargets" class="grid three"></div><div id="localResults" class="result-grid big"></div></section>
    </section>

    <section id="crossMode" class="mode">
      <section class="card"><h2>【跨境】价格输入</h2><div id="crossBuyer" class="grid"></div></section>
      <section class="card"><h2>跨境平台费用（默认全部关闭，等待真实结算单校准）</h2><div id="crossFees" class="fees"></div></section>
      <section class="card"><h2>【卖家结算端】广告费用、售后与订单风险预留</h2><div id="crossSeller"></div></section>
      <section class="card"><h2>真实订单复盘</h2><div id="crossReplay"></div></section>
      <section class="card"><h2>跨境成本</h2><div id="crossCosts" class="grid"></div></section>
      <section class="card"><h2>跨境利润结果 / 保本价 / 建议售价</h2><div id="crossTargets" class="grid three"></div><div id="crossResults" class="result-grid big"></div></section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
